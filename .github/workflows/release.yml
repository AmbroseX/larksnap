name: Release

# 只有推送 v 开头的 tag（如 v0.2.4）才触发打包发布
on:
  push:
    tags:
      - 'v*'

# 需要写权限才能创建 Release
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 拉全历史+tag 对象，否则读不到 annotated tag 的说明文字
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build extension
        run: npm run build

      # 从 package.json 读版本号，供文件命名使用
      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # 取 annotated tag 里手写的更新说明，作为 Release 正文（打 tag 时 -m 写的内容）
      # checkout 会把 annotated tag 降级成 lightweight，导致 %(contents) 取到 commit
      # 信息，所以先强制从远端把带说明的 tag 对象拉回来覆盖本地。
      - name: Extract release notes from tag
        run: |
          git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      # 打 zip（用于 Chrome 应用商店上传）
      - name: Pack ZIP
        run: |
          cd dist
          zip -r "../larksnap-v${{ steps.ver.outputs.version }}.zip" . -x '*.map' '*.DS_Store'

      # 打 crx（用于本地侧载分发，需要签名私钥）
      - name: Pack CRX
        uses: cardinalby/webext-buildtools-chrome-crx-action@v2
        with:
          zipFilePath: larksnap-v${{ steps.ver.outputs.version }}.zip
          crxFilePath: larksnap-v${{ steps.ver.outputs.version }}.crx
          privateKey: ${{ secrets.CRX_PRIVATE_KEY }}

      # 创建 Release 并把 zip + crx 作为附件上传
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # body_path=手写说明在上，generate_release_notes=自动 commit 对比链接追加在下
          body_path: RELEASE_NOTES.md
          files: |
            larksnap-v${{ steps.ver.outputs.version }}.zip
            larksnap-v${{ steps.ver.outputs.version }}.crx
          generate_release_notes: true
